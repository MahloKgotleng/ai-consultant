<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Summarizer Demo — Mahlo Kgotleng AI Consulting</title>
<style>
  body {font-family:'DM Sans',sans-serif; background:#050e09; color:#f0f7f2; margin:0; padding:0;}
  nav{display:flex;justify-content:space-between;padding:16px 40px;background:rgba(5,14,9,0.95);border-bottom:1px solid #163324;}
  .nav-logo{font-family:'Space Mono',monospace;color:#f0a500;letter-spacing:2px;}
  .nav-back{color:#7aab8a;text-decoration:none;font-size:13px;}
  main{max-width:800px;margin:60px auto;padding:0 20px;}
  h1{font-family:'Playfair Display',serif;color:#f0a500;font-size:36px;margin-bottom:16px;}
  textarea{width:100%;height:200px;padding:12px;border-radius:4px;border:1px solid #163324;background:#0a1f12;color:#f0f7f2;resize:none;}
  button{padding:12px 20px;margin-top:12px;background:#2e8b57;border:none;color:#f0f7f2;border-radius:4px;cursor:pointer;}
  button:hover{background:#52b788;}
  #result{margin-top:20px;padding:12px;border-radius:4px;border:1px solid #163324;background:#0a1f12;color:#52b788;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MK · AI Consulting</div>
  <a href="index.html" class="nav-back">← Back to Website</a>
</nav>
<main>
<h1>Text Summarizer Demo</h1>
<textarea id="input-text" placeholder="Paste text to summarize here..."></textarea>
<button id="summarize-btn">Summarize</button>
<div id="result"></div>
</main>
<script>
const HF_API_KEY = "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"; // <- replace with your Hugging Face API key
const MODEL_URL = "https://api-inference.huggingface.co/models/Granite/instruct"; // Granite instruct

async function summarizeText(text){
  const prompt = "Summarize this text clearly and concisely:\n\n" + text;
  const response = await fetch(MODEL_URL, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + HF_API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({inputs: prompt})
  });
  const data = await response.json();
  return data?.generated_text || data?.[0]?.generated_text || "No summary available";
}

document.getElementById('summarize-btn').addEventListener('click', async () => {
  const text = document.getElementById('input-text').value.trim();
  if(!text) return;
  const resultDiv = document.getElementById('result');
  resultDiv.textContent = "Summarizing...";
  const summary = await summarizeText(text);
  resultDiv.textContent = summary;
});
</script>
</body>
</html>
