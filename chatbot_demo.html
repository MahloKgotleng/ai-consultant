<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Demo — Mahlo Kgotleng AI Consulting</title>
<style>
  body {font-family:'DM Sans',sans-serif; background:#050e09; color:#f0f7f2; margin:0; padding:0;}
  nav{display:flex;justify-content:space-between;padding:16px 40px;background:rgba(5,14,9,0.95);border-bottom:1px solid #163324;}
  .nav-logo{font-family:'Space Mono',monospace;color:#f0a500;letter-spacing:2px;}
  .nav-back{color:#7aab8a;text-decoration:none;font-size:13px;}
  main{max-width:800px;margin:60px auto;padding:0 20px;}
  h1{font-family:'Playfair Display',serif;color:#f0a500;font-size:36px;margin-bottom:16px;}
  .chat-container{display:flex;flex-direction:column;gap:12px;}
  #chat-box{height:400px;overflow-y:auto;background:#0a1f12;padding:12px;border-radius:4px;border:1px solid #163324;}
  #user-input{width:100%;padding:12px;border-radius:4px;border:1px solid #163324;background:#0a1f12;color:#f0f7f2;}
  #send-btn{padding:12px 20px;margin-top:8px;background:#2e8b57;border:none;color:#f0f7f2;border-radius:4px;cursor:pointer;}
  #send-btn:hover{background:#52b788;}
  .message{margin-bottom:12px;}
  .user-msg{color:#ffc93c;}
  .bot-msg{color:#52b788;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">MK · AI Consulting</div>
  <a href="index.html" class="nav-back">← Back to Website</a>
</nav>
<main>
<h1>AI Chatbot Demo</h1>
<div class="chat-container">
  <div id="chat-box"></div>
  <input type="text" id="user-input" placeholder="Type your message here...">
  <button id="send-btn">Send</button>
</div>
</main>
<script>
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const button = document.getElementById('send-btn');

const HF_API_KEY = "YOUR_HF_API_KEY"; // <- replace with your Hugging Face API key
const MODEL_URL = "https://api-inference.huggingface.co/models/Granite/instruct"; // Granite instruct

async function queryGranite(prompt){
  const response = await fetch(MODEL_URL, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + HF_API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({inputs: prompt})
  });
  const data = await response.json();
  return data?.generated_text || data?.[0]?.generated_text || "No response";
}

button.addEventListener('click', async () => {
  const userText = input.value.trim();
  if(!userText) return;
  chatBox.innerHTML += `<div class="message user-msg">You: ${userText}</div>`;
  input.value = "";
  chatBox.innerHTML += `<div class="message bot-msg">Bot: ...thinking...</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;

  const botResponse = await queryGranite(userText);
  chatBox.lastChild.innerHTML = `Bot: ${botResponse}`;
  chatBox.scrollTop = chatBox.scrollHeight;
});

input.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') button.click();
});
</script>
</body>
</html>
